services:
  postgres:
    image: postgres:16-alpine
    container_name: oma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ourmediaarchive}
      POSTGRES_USER: ${POSTGRES_USER:-oma_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oma_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oma_app} -d ${POSTGRES_DB:-ourmediaarchive}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  postgres_data:
